<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Horse — Hi-Fi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>* { box-sizing: border-box; margin: 0; padding: 0; }</style>
</head>
<body style="background:#F5F0E8">
<script type="text/babel">
const { DCSection, DCArtboard, DesignCanvas } = window;

/* ── Design tokens ─────────────────────────────────────── */
const T = {
  // Primary: Saddle brown
  brown:        '#7A4728',
  brownHover:   '#63391F',
  brownSubtle:  '#F2EAE4',
  brownMid:     '#C4A898',

  // Secondary accent: Terracotta
  terra:        '#C4622D',
  terra100:     '#F5E4D8',

  // Olive (completion / success)
  olive:        '#5C6633',
  olive100:     '#EBEFD4',

  // Sand neutrals
  sand50:  '#FDFAF5', sand100: '#F5F0E8', sand200: '#EDE8DC',
  sand300: '#E0D9CE', sand400: '#C8BFB0', sand500: '#9B8E7E',
  sand600: '#6E6257', sand700: '#4A4038', sand800: '#2E271F', sand900: '#1E1A14',

  // Semantic
  bgBase:    '#F5F0E8',
  bgSurface: '#FDFAF5',
  bgSubtle:  '#EDE8DC',
  fgPrimary: '#1E1A14',
  fgSecond:  '#6E6257',
  fgTertiary:'#9B8E7E',
  borderSubtle:  '#E0D9CE',
  borderDefault: '#C8BFB0',

  // Type
  fontDisplay: "'Syne', sans-serif",
  fontBody:    "'Roboto', sans-serif",

  // Shadows
  shadowSm: '0 2px 8px rgba(30,26,20,0.08)',
  shadowMd: '0 4px 16px rgba(30,26,20,0.10)',
  shadowLg: '0 8px 32px rgba(30,26,20,0.14)',

  // Radius
  rSm: 4, rMd: 8, rLg: 16, rPill: 999,
};

/* ── Workout type system ───────────────────────────────── */
const W = {
  easy:      { label: 'Easy Run',   color: '#5C6633', bg: '#EBEFD4', bar: '#849948' },
  long:      { label: 'Long Run',   color: '#2A5E8A', bg: '#E4EDF5', bar: '#4A8EC4' },
  tempo:     { label: 'Tempo',      color: '#B87A20', bg: '#F5EDD4', bar: '#D4922A' },
  threshold: { label: 'Threshold',  color: '#C4622D', bg: '#F5E4D8', bar: '#C4622D' },
  intervals: { label: 'Intervals',  color: '#7B3F8A', bg: '#EEE4F5', bar: '#9B5EAA' },
  recovery:  { label: 'Recovery',   color: '#9B8E7E', bg: '#F0ECE8', bar: '#C8BFB0' },
  rest:      { label: 'Rest day',   color: '#C8BFB0', bg: '#F5F2EE', bar: '#E0D9CE' },
  race:      { label: 'Race',       color: '#B83232', bg: '#F5E4E4', bar: '#B83232' },
};

/* ── Primitives ────────────────────────────────────────── */
const Screen = ({ w = 390, h = 844, bg = T.bgBase, style = {}, children }) => (
  <div style={{ width: w, height: h, background: bg, overflow: 'hidden', position: 'relative', fontFamily: T.fontBody, flexShrink: 0, ...style }}>
    {children}
  </div>
);

const Card = ({ children, style = {} }) => (
  <div style={{ background: T.bgSurface, borderRadius: T.rMd, border: `1px solid ${T.borderSubtle}`, boxShadow: T.shadowSm, ...style }}>
    {children}
  </div>
);

const Badge = ({ type = 'easy', sm }) => {
  const w = W[type] || W.easy;
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', background: w.bg, color: w.color, border: `1px solid ${w.color}30`, borderRadius: T.rPill, padding: sm ? '2px 8px' : '3px 10px', fontSize: sm ? 10 : 12, fontWeight: 500, fontFamily: T.fontBody, letterSpacing: '0.01em', whiteSpace: 'nowrap' }}>
      {w.label}
    </span>
  );
};

const Row = ({ children, style = {} }) => <div style={{ display: 'flex', alignItems: 'center', gap: 8, ...style }}>{children}</div>;
const Col = ({ children, style = {} }) => <div style={{ display: 'flex', flexDirection: 'column', ...style }}>{children}</div>;
const Spacer = () => <div style={{ flex: 1 }} />;
const Hr = ({ style = {} }) => <div style={{ height: 1, background: T.borderSubtle, ...style }} />;

const Disp = ({ children, size = 24, style = {} }) => (
  <div style={{ fontFamily: T.fontDisplay, fontWeight: 700, fontSize: size, letterSpacing: '-0.03em', lineHeight: 1.05, color: T.fgPrimary, ...style }}>{children}</div>
);
const Hdg = ({ children, size = 15, style = {} }) => (
  <div style={{ fontFamily: T.fontDisplay, fontWeight: 600, fontSize: size, letterSpacing: '-0.01em', lineHeight: 1.25, color: T.fgPrimary, ...style }}>{children}</div>
);
const Lbl = ({ children, style = {} }) => (
  <div style={{ fontFamily: T.fontBody, fontSize: 10, fontWeight: 500, letterSpacing: '0.07em', textTransform: 'uppercase', color: T.fgTertiary, ...style }}>{children}</div>
);
const Body = ({ children, style = {} }) => (
  <div style={{ fontFamily: T.fontBody, fontSize: 14, lineHeight: 1.55, color: T.fgSecond, ...style }}>{children}</div>
);
const Sm = ({ children, style = {} }) => (
  <div style={{ fontFamily: T.fontBody, fontSize: 12, color: T.fgTertiary, lineHeight: 1.4, ...style }}>{children}</div>
);

const BtnPrimary = ({ children, style = {} }) => (
  <div style={{ background: T.brown, color: '#fff', borderRadius: T.rMd, padding: '12px 20px', fontFamily: T.fontBody, fontSize: 14, fontWeight: 500, cursor: 'pointer', textAlign: 'center', ...style }}>{children}</div>
);
const BtnSecondary = ({ children, style = {} }) => (
  <div style={{ background: 'transparent', color: T.fgPrimary, border: `1px solid ${T.borderDefault}`, borderRadius: T.rMd, padding: '11px 20px', fontFamily: T.fontBody, fontSize: 14, fontWeight: 400, cursor: 'pointer', textAlign: 'center', ...style }}>{children}</div>
);

const StatGrid = ({ stats }) => (
  <div style={{ display: 'grid', gridTemplateColumns: `repeat(${stats.length}, 1fr)`, gap: 1, background: T.borderSubtle, borderRadius: T.rMd, overflow: 'hidden' }}>
    {stats.map(({ lbl, val, unit }) => (
      <div key={lbl} style={{ background: T.bgSurface, padding: '9px 10px' }}>
        <Lbl style={{ marginBottom: 3 }}>{lbl}</Lbl>
        <Row style={{ alignItems: 'baseline', gap: 2 }}>
          <Disp size={18}>{val}</Disp>
          {unit && <span style={{ fontSize: 10, color: T.fgTertiary, fontFamily: T.fontBody }}>{unit}</span>}
        </Row>
      </div>
    ))}
  </div>
);

const StatusBar = ({ dark }) => (
  <div style={{ height: 44, display: 'flex', alignItems: 'center', padding: '0 20px', justifyContent: 'space-between', flexShrink: 0 }}>
    <span style={{ fontSize: 15, fontWeight: 600, fontFamily: T.fontBody, color: dark ? '#fff' : T.fgPrimary }}>9:41</span>
    <span style={{ fontSize: 11, color: dark ? '#ffffff60' : T.fgTertiary, letterSpacing: 2 }}>●●●</span>
  </div>
);

const BottomNav = ({ active = 'today' }) => {
  const tabs = [{ id: 'today', label: 'Today' }, { id: 'calendar', label: 'Calendar' }, { id: 'plans', label: 'Plans' }];
  return (
    <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: 72, background: T.bgSurface, borderTop: `1px solid ${T.borderSubtle}`, display: 'flex', paddingBottom: 12 }}>
      {tabs.map(({ id, label }) => {
        const on = active === id;
        return (
          <div key={id} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 3, cursor: 'pointer' }}>
            <div style={{ width: 32, height: 22, borderRadius: T.rMd, background: on ? T.brownSubtle : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ width: on ? 18 : 16, height: on ? 18 : 14, borderRadius: 3, background: on ? T.brown : T.fgTertiary, opacity: on ? 1 : 0.4 }} />
            </div>
            <span style={{ fontFamily: T.fontBody, fontSize: 10, fontWeight: on ? 500 : 400, color: on ? T.brown : T.fgTertiary }}>{label}</span>
          </div>
        );
      })}
    </div>
  );
};

const FAB = () => (
  <div style={{ position: 'absolute', bottom: 84, right: 16, height: 44, borderRadius: T.rPill, background: T.brown, color: '#fff', display: 'flex', alignItems: 'center', gap: 6, padding: '0 18px', boxShadow: T.shadowMd, fontFamily: T.fontBody, fontSize: 14, fontWeight: 500, cursor: 'pointer', letterSpacing: '-0.01em' }}>
    <span style={{ fontSize: 14, opacity: 0.9 }}>✦</span> Coach
  </div>
);

const Sidebar = ({ active = 'today' }) => {
  const items = [{ id: 'today', label: 'Today' }, { id: 'calendar', label: 'Calendar' }, { id: 'plans', label: 'Plans' }];
  return (
    <div style={{ width: 220, background: T.bgSurface, borderRight: `1px solid ${T.borderSubtle}`, display: 'flex', flexDirection: 'column', padding: '28px 16px 24px', flexShrink: 0 }}>
      <Disp size={18} style={{ color: T.brown, marginBottom: 4, letterSpacing: '-0.02em' }}>Race Horse</Disp>
      <Sm style={{ marginBottom: 28 }}>Colby Schulz</Sm>
      <Col style={{ gap: 1 }}>
        {items.map(({ id, label }) => {
          const on = active === id;
          return (
            <div key={id} style={{ padding: '9px 12px', borderRadius: T.rMd, background: on ? T.brownSubtle : 'transparent', color: on ? T.brown : T.fgSecond, fontFamily: T.fontBody, fontSize: 14, fontWeight: on ? 500 : 400, cursor: 'pointer', transition: 'all 200ms' }}>{label}</div>
          );
        })}
      </Col>
      <Spacer />
      <BtnPrimary style={{ fontSize: 13, padding: '10px 14px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
        <span style={{ opacity: 0.8 }}>✦</span> Ask coach
      </BtnPrimary>
    </div>
  );
};

/* ════════════════════════════════════════════════════════
   SCREENS
   ════════════════════════════════════════════════════════ */

/* ── Landing A – Light + editorial ── */
const LandingA = () => (
  <Screen>
    <StatusBar />
    <Col style={{ padding: '12px 28px 44px', height: 'calc(100% - 44px)', justifyContent: 'space-between' }}>
      {/* Editorial hero type */}
      <Col style={{ gap: 0 }}>
        <Disp size={72} style={{ letterSpacing: '-0.05em', lineHeight: 0.88, color: T.fgPrimary }}>Race<br />Horse</Disp>
        <Hr style={{ margin: '20px 0', background: T.borderDefault }} />
        <Body style={{ fontSize: 15, color: T.fgSecond, lineHeight: 1.65, maxWidth: 290 }}>
          A virtual coach for runners and cyclists who think in pace zones, FTP, and threshold.
        </Body>
      </Col>
      {/* Feature list — tight, editorial */}
      <Col style={{ gap: 0 }}>
        {[
          'Build & tweak training plans',
          'Analyze your Strava workouts lap-by-lap',
          'Ask anything — gear, races, pacing strategy',
        ].map((line, i, arr) => (
          <div key={line} style={{ padding: '12px 0', borderBottom: i < arr.length - 1 ? `1px solid ${T.borderSubtle}` : 'none' }}>
            <Row style={{ gap: 10 }}>
              <div style={{ width: 4, height: 4, borderRadius: 999, background: T.brown, flexShrink: 0 }} />
              <span style={{ fontFamily: T.fontBody, fontSize: 14, color: T.fgPrimary }}>{line}</span>
            </Row>
          </div>
        ))}
      </Col>
      <Col style={{ gap: 10 }}>
        <BtnPrimary>Sign in with Strava</BtnPrimary>
        <Sm style={{ textAlign: 'center' }}>Free · race.horse</Sm>
      </Col>
    </Col>
  </Screen>
);

/* ── Landing B – Editorial, dark ── */
const LandingB = () => (
  <Screen bg={T.sand900}>
    <StatusBar dark />
    <Col style={{ padding: '16px 28px 44px', height: 'calc(100% - 44px)', justifyContent: 'space-between' }}>
      <Col>
        <Disp size={68} style={{ color: '#fff', lineHeight: 0.9, letterSpacing: '-0.05em', marginBottom: 28 }}>
          Race<br />Horse
        </Disp>
        <Body style={{ color: T.sand500, fontSize: 15, lineHeight: 1.65, maxWidth: 290 }}>
          A coach that knows your training history, your goals, and exactly the right questions to ask.
        </Body>
      </Col>
      <Col style={{ gap: 20 }}>
        <Hr style={{ background: T.sand700 }} />
        <Col style={{ gap: 10 }}>
          {['Strava-connected — always in sync', 'Plans, workouts, analysis in one place', 'Free · race.horse'].map(line => (
            <Row key={line} style={{ gap: 10 }}>
              <div style={{ width: 4, height: 4, borderRadius: 999, background: T.brown, flexShrink: 0 }} />
              <span style={{ fontFamily: T.fontBody, fontSize: 13, color: T.sand500 }}>{line}</span>
            </Row>
          ))}
        </Col>
        <BtnPrimary style={{ marginTop: 4 }}>Sign in with Strava</BtnPrimary>
      </Col>
    </Col>
  </Screen>
);

/* ── Today A – Card-heavy ── */
const TodayA = () => (
  <Screen>
    <StatusBar />
    <div style={{ padding: '0 20px 10px', borderBottom: `1px solid ${T.borderSubtle}` }}>
      <Disp size={22}>Friday, Apr 25</Disp>
      <Sm style={{ marginTop: 2 }}>Week 8 of 16 — Boston Marathon Build</Sm>
    </div>
    <div style={{ height: 'calc(100% - 136px)', overflowY: 'auto', padding: '14px 16px 80px' }}>
      {/* Hero card */}
      <Card style={{ padding: 16, marginBottom: 12, borderColor: T.brown, borderWidth: 2 }}>
        <Row style={{ marginBottom: 12 }}>
          <Badge type="tempo" />
          <Spacer />
          <Sm style={{ color: T.brown, fontWeight: 500 }}>Today</Sm>
        </Row>
        <Disp size={30} style={{ marginBottom: 14 }}>Tempo Run</Disp>
        <StatGrid stats={[
          { lbl: 'Distance', val: '8', unit: 'mi' },
          { lbl: 'Duration', val: '60', unit: 'min' },
          { lbl: 'Pace', val: '7:15', unit: '/mi' },
          { lbl: 'HR', val: 'Z3–4', unit: '' },
        ]} />
        <Body style={{ fontSize: 13, lineHeight: 1.6, margin: '12px 0' }}>
          2mi easy warm-up → 4mi at tempo effort → 2mi cool-down. Controlled — not a race effort.
        </Body>
        {/* Strava match */}
        <div style={{ background: T.olive100, borderRadius: T.rMd, padding: 12, border: `1px solid ${T.olive}25`, marginBottom: 12 }}>
          <Row style={{ marginBottom: 8, gap: 6 }}>
            <span style={{ color: T.olive, fontSize: 13, fontWeight: 600 }}>✓</span>
            <span style={{ fontFamily: T.fontBody, fontSize: 13, fontWeight: 500, color: T.olive }}>Strava matched — Morning Run</span>
            <Spacer />
            <span style={{ fontFamily: T.fontBody, fontSize: 12, color: T.fgTertiary, cursor: 'pointer' }}>Laps →</span>
          </Row>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 6 }}>
            {[['7.9mi','Dist'],['57:42','Time'],['7:17','Pace'],['148','HR avg']].map(([v,l]) => (
              <Col key={l} style={{ gap: 1 }}>
                <Disp size={15}>{v}</Disp>
                <Lbl>{l}</Lbl>
              </Col>
            ))}
          </div>
        </div>
        <div style={{ border: `1px dashed ${T.borderDefault}`, borderRadius: T.rMd, padding: '9px 14px', textAlign: 'center', color: T.brown, fontFamily: T.fontBody, fontSize: 13, fontWeight: 500, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
          <span style={{ opacity: 0.8 }}>✦</span> Ask coach about today
        </div>
      </Card>
      {/* Coming up */}
      <Lbl style={{ marginBottom: 8 }}>Coming up</Lbl>
      <Col style={{ gap: 6 }}>
        {[['Sat','long','18 mi','2:30 hr'],['Sun','recovery','5 mi','45 min']].map(([day, type, dist, dur]) => (
          <Card key={day} style={{ padding: '10px 14px' }}>
            <Row>
              <Sm style={{ width: 26, flexShrink: 0, fontWeight: 500 }}>{day}</Sm>
              <Badge type={type} sm />
              <Spacer />
              <Col style={{ alignItems: 'flex-end', gap: 1 }}>
                <Hdg size={14}>{dist}</Hdg>
                <Sm>{dur}</Sm>
              </Col>
            </Row>
          </Card>
        ))}
      </Col>
    </div>
    <FAB />
    <BottomNav active="today" />
  </Screen>
);

/* ── Today B – Editorial big type ── */
const TodayB = () => (
  <Screen>
    <StatusBar />
    <div style={{ padding: '0 20px 10px', borderBottom: `1px solid ${T.borderSubtle}` }}>
      <Row>
        <Col style={{ gap: 2 }}>
          <Lbl>Fri Apr 25 · Week 8 / 16</Lbl>
          <Hdg size={13} style={{ color: T.fgSecond }}>Boston Marathon Build</Hdg>
        </Col>
        <Spacer />
        <Badge type="tempo" sm />
      </Row>
    </div>
    {/* Big editorial block */}
    <div style={{ padding: '22px 20px 18px', borderBottom: `1px solid ${T.borderSubtle}` }}>
      <Disp size={54} style={{ letterSpacing: '-0.05em', lineHeight: 0.88, marginBottom: 18 }}>Tempo<br />Run</Disp>
      <Row style={{ gap: 0 }}>
        {[{ v: '8', u: 'mi' }, { v: '60', u: 'min' }, { v: '7:15', u: '/mi' }].map(({ v, u }, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 36, background: T.borderDefault, margin: '0 14px' }} />}
            <Row style={{ alignItems: 'baseline', gap: 3 }}>
              <Disp size={26}>{v}</Disp>
              <span style={{ fontSize: 11, color: T.fgTertiary, fontFamily: T.fontBody }}>{u}</span>
            </Row>
          </React.Fragment>
        ))}
      </Row>
    </div>
    {/* Intensity zones */}
    <div style={{ padding: '14px 20px', borderBottom: `1px solid ${T.borderSubtle}` }}>
      <Row style={{ gap: 6, marginBottom: 12 }}>
        {[['Pace', '7:15–7:30'], ['HR', 'Z3–4'], ['RPE', '7 / 10']].map(([l, v]) => (
          <div key={l} style={{ flex: 1, background: T.bgSubtle, borderRadius: T.rMd, padding: '8px 10px' }}>
            <Lbl style={{ marginBottom: 4 }}>{l}</Lbl>
            <Hdg size={13}>{v}</Hdg>
          </div>
        ))}
      </Row>
      <Body style={{ fontSize: 13, color: T.fgSecond, lineHeight: 1.6 }}>
        Warm-up 2mi → tempo 4mi → cool-down 2mi. Stay smooth — not a race.
      </Body>
    </div>
    {/* Strava row */}
    <div style={{ padding: '12px 20px', borderBottom: `1px solid ${T.borderSubtle}` }}>
      <Row style={{ background: T.olive100, borderRadius: T.rMd, padding: '10px 14px', gap: 10 }}>
        <span style={{ color: T.olive, fontWeight: 600 }}>✓</span>
        <Col style={{ flex: 1, gap: 1 }}>
          <span style={{ fontFamily: T.fontBody, fontSize: 13, fontWeight: 500, color: T.olive }}>Strava matched</span>
          <Sm>7.9 mi · 57:42 · 7:17/mi · 148 bpm avg</Sm>
        </Col>
        <span style={{ fontFamily: T.fontBody, fontSize: 12, color: T.fgTertiary, cursor: 'pointer' }}>Laps →</span>
      </Row>
    </div>
    {/* Upcoming — compact list */}
    <div style={{ padding: '0 20px 80px' }}>
      <Lbl style={{ padding: '12px 0 8px' }}>Up next</Lbl>
      {[['Sat','long','18 mi'],['Sun','recovery','5 mi']].map(([d, t, v]) => (
        <Row key={d} style={{ padding: '11px 0', borderBottom: `1px solid ${T.borderSubtle}`, gap: 10 }}>
          <Sm style={{ width: 24, flexShrink: 0 }}>{d}</Sm>
          <Badge type={t} sm />
          <Spacer />
          <Hdg size={14}>{v}</Hdg>
        </Row>
      ))}
    </div>
    <FAB />
    <BottomNav active="today" />
  </Screen>
);

/* ── Today Desktop ── */
const TodayDesktop = () => (
  <div style={{ width: 1280, height: 800, display: 'flex', fontFamily: T.fontBody, background: T.bgBase }}>
    <Sidebar active="today" />
    {/* Main */}
    <div style={{ flex: 1, padding: '28px 32px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div>
        <Disp size={28}>Friday, April 25</Disp>
        <Sm style={{ marginTop: 3 }}>Week 8 of 16 · Boston Marathon Build</Sm>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 20 }}>
        {/* Hero card */}
        <Card style={{ padding: 24, borderColor: T.brown, borderWidth: 2 }}>
          <Row style={{ marginBottom: 14 }}>
            <Badge type="tempo" />
            <Spacer />
            <Sm style={{ color: T.brown, fontWeight: 500 }}>Today</Sm>
          </Row>
          <Disp size={36} style={{ marginBottom: 20 }}>Tempo Run</Disp>
          <StatGrid stats={[
            { lbl: 'Distance', val: '8', unit: 'mi' },
            { lbl: 'Duration', val: '60', unit: 'min' },
            { lbl: 'Target Pace', val: '7:15', unit: '/mi' },
            { lbl: 'HR Zone', val: 'Z3–4', unit: '' },
            { lbl: 'RPE', val: '7', unit: '/10' },
          ]} />
          <Body style={{ fontSize: 14, margin: '16px 0', lineHeight: 1.65 }}>
            2mi easy warm-up → 4mi at tempo effort → 2mi cool-down. Controlled — not a race effort.
          </Body>
          <div style={{ background: T.olive100, borderRadius: T.rMd, padding: 14, border: `1px solid ${T.olive}25`, marginBottom: 16 }}>
            <Row style={{ marginBottom: 10 }}>
              <span style={{ fontFamily: T.fontBody, fontSize: 13, fontWeight: 500, color: T.olive }}>✓ Strava matched — Morning Run</span>
              <Spacer />
              <span style={{ fontFamily: T.fontBody, fontSize: 12, color: T.fgTertiary, cursor: 'pointer' }}>View laps →</span>
            </Row>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 10 }}>
              {[['7.9 mi','Dist'],['57:42','Time'],['7:17/mi','Pace'],['148','HR avg'],['162','HR max']].map(([v, l]) => (
                <Col key={l} style={{ gap: 2 }}>
                  <Disp size={16}>{v}</Disp>
