<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Race Horse — Wireframes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Syne:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #f0ece4;
        font-family: "Caveat", cursive;
      }

      /* Sketch primitives */
      .sk-screen {
        background: #fafaf8;
        border: 2px solid #1e1a14;
        border-radius: 4px;
        overflow: hidden;
        font-family: "Caveat", cursive;
        position: relative;
      }
      .sk-box {
        border: 1.5px solid #1e1a14;
        border-radius: 3px;
        background: #fff;
      }
      .sk-box.dashed {
        border-style: dashed;
        background: #f5f2ec;
      }
      .sk-box.filled {
        background: #1e1a14;
        color: #fff;
      }
      .sk-box.accent {
        background: #7a4728;
        color: #fff;
        border-color: #7a4728;
      }
      .sk-box.muted {
        background: #ede8dc;
        border-color: #9b8e7e;
      }
      .sk-box.pill {
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 11px;
        display: inline-flex;
        align-items: center;
      }
      .sk-label {
        font-family: "Caveat", cursive;
        font-size: 13px;
        color: #9b8e7e;
      }
      .sk-title {
        font-family: "Caveat", cursive;
        font-size: 16px;
        font-weight: 700;
        color: #1e1a14;
      }
      .sk-h1 {
        font-size: 22px;
        font-weight: 700;
        color: #1e1a14;
        font-family: "Caveat", cursive;
      }
      .sk-h2 {
        font-size: 17px;
        font-weight: 700;
        color: #1e1a14;
        font-family: "Caveat", cursive;
      }
      .sk-small {
        font-size: 11px;
        color: #9b8e7e;
        font-family: "Caveat", cursive;
      }
      .sk-input {
        border: 1.5px solid #9b8e7e;
        border-radius: 3px;
        background: #fafaf8;
        height: 30px;
        width: 100%;
        padding: 0 8px;
        font-family: "Caveat", cursive;
        font-size: 13px;
        color: #1e1a14;
      }
      .sk-divider {
        border: none;
        border-top: 1.5px dashed #c8bfb0;
        margin: 8px 0;
      }
      .sk-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .sk-col {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .sk-spacer {
        flex: 1;
      }
      .sk-badge {
        font-family: "Caveat", cursive;
        font-size: 10px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 999px;
        border: 1.5px solid currentColor;
        white-space: nowrap;
      }
      .badge-easy {
        color: #5c6633;
        background: #f0f2e8;
        border-color: #5c6633;
      }
      .badge-long {
        color: #2d5c8e;
        background: #e8f0f8;
        border-color: #2d5c8e;
      }
      .badge-tempo {
        color: #8e5c2d;
        background: #f8ede8;
        border-color: #8e5c2d;
      }
      .badge-threshold {
        color: #c4622d;
        background: #fdf0ec;
        border-color: #c4622d;
      }
      .badge-intervals {
        color: #7b2d8e;
        background: #f5e8f8;
        border-color: #7b2d8e;
      }
      .badge-recovery {
        color: #9b8e7e;
        background: #f5f2ec;
        border-color: #9b8e7e;
      }
      .badge-rest {
        color: #c8bfb0;
        background: #f5f2ec;
        border-color: #c8bfb0;
      }
      .badge-race {
        color: #8e2d2d;
        background: #f8e8e8;
        border-color: #8e2d2d;
      }
      .sk-tab-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 48px;
        background: #fafaf8;
        border-top: 1.5px solid #c8bfb0;
        display: flex;
        align-items: stretch;
      }
      .sk-tab {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Caveat", cursive;
        font-size: 11px;
        color: #9b8e7e;
        gap: 2px;
        cursor: pointer;
      }
      .sk-tab.active {
        color: #1e1a14;
        font-weight: 700;
      }
      .sk-tab-icon {
        width: 16px;
        height: 16px;
        border: 1.5px solid currentColor;
        border-radius: 3px;
      }
      .sk-fab {
        position: absolute;
        bottom: 60px;
        right: 12px;
        width: 42px;
        height: 42px;
        background: #c4622d;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 20px;
        font-weight: 700;
        border: 2px solid #1e1a14;
        box-shadow: 2px 2px 0 #1e1a14;
      }
      .sk-sidebar {
        width: 180px;
        border-right: 1.5px solid #c8bfb0;
        background: #f5f0e8;
        display: flex;
        flex-direction: column;
        padding: 16px 12px;
        gap: 8px;
        flex-shrink: 0;
      }
      .sk-nav-item {
        font-family: "Caveat", cursive;
        font-size: 13px;
        color: #9b8e7e;
        padding: 6px 8px;
        border-radius: 4px;
      }
      .sk-nav-item.active {
        background: #ede8dc;
        color: #1e1a14;
        font-weight: 700;
        border: 1.5px solid #c8bfb0;
      }
      .sk-annotation {
        position: absolute;
        font-family: "Caveat", cursive;
        font-size: 11px;
        color: #c4622d;
        pointer-events: none;
      }
      .sk-arrow {
        position: absolute;
        color: #c4622d;
        font-size: 13px;
        font-family: "Caveat", cursive;
      }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 2px;
      }
      .cal-cell {
        border: 1px solid #c8bfb0;
        border-radius: 2px;
        padding: 3px;
        min-height: 48px;
        background: #fff;
        font-family: "Caveat", cursive;
      }
      .cal-cell.today {
        background: #fdf0ec;
        border-color: #c4622d;
      }
      .cal-cell.dim {
        background: #f5f2ec;
      }
      .cal-date {
        font-size: 10px;
        color: #9b8e7e;
        margin-bottom: 2px;
      }
      .cal-date.today-num {
        color: #c4622d;
        font-weight: 700;
      }
      .cal-check {
        color: #5c6633;
        font-size: 10px;
      }
      .week-row {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
      }
      .week-cell {
        border: 1.5px solid #c8bfb0;
        border-radius: 3px;
        padding: 6px 5px;
        background: #fff;
        min-height: 80px;
        font-family: "Caveat", cursive;
      }
      .week-cell.today {
        background: #fdf6f3;
        border-color: #c4622d;
        border-width: 2px;
      }
      .chat-bubble {
        border-radius: 8px;
        padding: 8px 10px;
        font-family: "Caveat", cursive;
        font-size: 12px;
        max-width: 80%;
        line-height: 1.4;
      }
      .chat-bubble.user {
        background: #1e1a14;
        color: #fff;
        margin-left: auto;
        border-radius: 8px 8px 2px 8px;
      }
      .chat-bubble.coach {
        background: #ede8dc;
        color: #1e1a14;
        border-radius: 8px 8px 8px 2px;
        border: 1.5px solid #c8bfb0;
      }
      .tool-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: #f5f2ec;
        border: 1.5px dashed #9b8e7e;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 10px;
        color: #9b8e7e;
      }
    </style>
  </head>
  <body>
    <script type="text/babel">
      const { DCSection, DCArtboard, DesignCanvas } = window;

      /* ─── Reusable sketch primitives ─── */
      const Box = ({ style, className = "", children, ...rest }) => (
        <div className={`sk-box ${className}`} style={style} {...rest}>
          {children}
        </div>
      );

      const Label = ({ children, style }) => (
        <div className="sk-label" style={style}>
          {children}
        </div>
      );
      const Title = ({ children, style }) => (
        <div className="sk-title" style={style}>
          {children}
        </div>
      );
      const Small = ({ children, style }) => (
        <div className="sk-small" style={style}>
          {children}
        </div>
      );
      const Divider = () => <hr className="sk-divider" />;
      const Row = ({ children, style }) => (
        <div className="sk-row" style={style}>
          {children}
        </div>
      );
      const Col = ({ children, style }) => (
        <div className="sk-col" style={style}>
          {children}
        </div>
      );
      const Spacer = () => <div className="sk-spacer" />;

      const Badge = ({ type = "easy" }) => {
        const labels = {
          easy: "Easy Run",
          long: "Long Run",
          tempo: "Tempo",
          threshold: "Threshold",
          intervals: "Intervals",
          recovery: "Recovery",
          rest: "Rest",
          race: "Race",
        };
        return <span className={`sk-badge badge-${type}`}>{labels[type] || type}</span>;
      };

      const TabBar = ({ active = "today" }) => (
        <div className="sk-tab-bar">
          {[
            ["today", "Today"],
            ["calendar", "Cal"],
            ["plans", "Plans"],
          ].map(([id, label]) => (
            <div key={id} className={`sk-tab ${active === id ? "active" : ""}`}>
              <div className="sk-tab-icon" />
              {label}
            </div>
          ))}
        </div>
      );

      const FAB = () => (
        <div className="sk-fab" title="Ask coach">
          ✦
        </div>
      );

      const Sidebar = ({ active = "today" }) => (
        <div className="sk-sidebar">
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#1E1A14", fontFamily: "Caveat" }}>
              Race Horse
            </div>
            <div className="sk-small">Colby Schulz</div>
          </div>
          <Divider />
          {[
            ["today", "Today"],
            ["calendar", "Calendar"],
            ["plans", "Plans"],
          ].map(([id, label]) => (
            <div key={id} className={`sk-nav-item ${active === id ? "active" : ""}`}>
              {label}
            </div>
          ))}
          <Spacer />
          <Box
            className="accent"
            style={{
              borderRadius: 6,
              padding: "8px 10px",
              textAlign: "center",
              fontSize: 13,
              cursor: "pointer",
              marginTop: 8,
            }}
          >
            Ask coach ✦
          </Box>
        </div>
      );

      /* ─── SCREEN 1: Landing Page ─── */
      const LandingScreen = () => (
        <div
          className="sk-screen"
          style={{
            width: 375,
            height: 660,
            position: "relative",
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            justifyContent: "center",
            padding: 32,
            gap: 16,
            background: "#F5F0E8",
          }}
        >
          {/* logo mark placeholder */}
          <div
            style={{
              width: 56,
              height: 56,
              border: "2.5px solid #1E1A14",
              borderRadius: 8,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              background: "#fff",
            }}
          >
            <span style={{ fontSize: 28, fontFamily: "Caveat", fontWeight: 700, color: "#C4622D" }}>
              🏃
            </span>
          </div>
          <div style={{ textAlign: "center" }}>
            <div className="sk-h1" style={{ fontSize: 26, marginBottom: 6 }}>
              Race Horse
            </div>
            <div className="sk-label" style={{ fontSize: 13, maxWidth: 260, lineHeight: 1.4 }}>
              A virtual running & cycling coach for athletes who think in pace zones, FTP, and
              threshold.
            </div>
          </div>
          {/* Feature bullets */}
          <Col style={{ width: "100%", gap: 8, marginTop: 4 }}>
            {[
              "Build & tweak training plans",
              "Analyze your Strava workouts",
              "Ask anything about training or gear",
            ].map((f, i) => (
              <Row key={i} style={{ gap: 8 }}>
                <span style={{ color: "#5C6633", fontSize: 14 }}>✓</span>
                <div className="sk-label" style={{ fontSize: 13, color: "#1E1A14" }}>
                  {f}
                </div>
              </Row>
            ))}
          </Col>
          {/* CTA */}
          <div style={{ width: "100%", marginTop: 8 }}>
            <Box
              className="accent"
              style={{
                textAlign: "center",
                padding: "12px 0",
                fontSize: 16,
                fontWeight: 700,
                borderRadius: 6,
                cursor: "pointer",
              }}
            >
              Sign in with Strava
            </Box>
            <div className="sk-small" style={{ textAlign: "center", marginTop: 8 }}>
              Free. No account required — just Strava.
            </div>
          </div>
          {/* annotation */}
          <div
            className="sk-annotation"
            style={{ bottom: 16, right: 16, transform: "rotate(-2deg)" }}
          >
            Only auth path → Strava
          </div>
        </div>
      );

      /* ─── SCREEN 2: Today (Mobile) ─── */
      const TodayMobile = () => (
        <div
          className="sk-screen"
          style={{
            width: 375,
            height: 720,
            position: "relative",
            display: "flex",
            flexDirection: "column",
          }}
        >
          {/* Status bar */}
          <div
            style={{
              height: 24,
              background: "#F5F0E8",
              display: "flex",
              alignItems: "center",
              padding: "0 16px",
              justifyContent: "space-between",
            }}
          >
            <Small>9:41</Small>
            <Small>●●●</Small>
          </div>
          {/* Header */}
          <div style={{ padding: "12px 16px 8px", borderBottom: "1px solid #EDE8DC" }}>
            <Row>
              <Col>
                <div className="sk-h2">Friday, Apr 25</div>
                <Label>Week 8 of 16 — Boston Marathon Build</Label>
              </Col>
              <Spacer />
              <div
                style={{
                  width: 32,
                  height: 32,
                  borderRadius: 999,
                  border: "1.5px solid #C8BFB0",
                  background: "#EDE8DC",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  fontSize: 14,
                }}
              >
                C
              </div>
            </Row>
          </div>
          {/* Hero workout card */}
          <div style={{ padding: "12px 16px", flex: 1, overflowY: "auto", paddingBottom: 80 }}>
            <Box style={{ padding: 16, marginBottom: 12, borderColor: "#C4622D", borderWidth: 2 }}>
              <Row style={{ marginBottom: 10 }}>
                <Badge type="tempo" />
                <Spacer />
                <Small>8 mi · 60 min</Small>
              </Row>
              {/* Intensity block */}
              <Box className="muted" style={{ padding: 10, marginBottom: 10, borderRadius: 4 }}>
                <Row>
                  <Col style={{ gap: 2 }}>
                    <Small>Target Pace</Small>
                    <div
                      style={{
                        fontSize: 15,
                        fontWeight: 700,
                        fontFamily: "Caveat",
                        color: "#1E1A14",
                      }}
                    >
                      7:15–7:30 /mi
                    </div>
                  </Col>
                  <Spacer />
                  <Col style={{ gap: 2, textAlign: "right" }}>
                    <Small>HR Zone</Small>
                    <div
                      style={{
                        fontSize: 15,
                        fontWeight: 700,
                        fontFamily: "Caveat",
                        color: "#1E1A14",
                      }}
                    >
                      Z3–Z4
                    </div>
                  </Col>
                </Row>
              </Box>
              <div
                style={{
                  fontSize: 12,
                  fontFamily: "Caveat",
                  color: "#5c5048",
                  lineHeight: 1.4,
                  marginBottom: 10,
                }}
              >
                2mi easy warm-up → 4mi at tempo → 2mi cool-down. Stay relaxed, not a race effort.
              </div>
              {/* Strava match */}
              <Box
                className="muted"
                style={{
                  padding: 8,
                  borderRadius: 4,
                  borderColor: "#5C6633",
                  borderStyle: "solid",
                }}
              >
                <Row style={{ gap: 6 }}>
                  <span style={{ color: "#5C6633", fontSize: 14 }}>✓</span>
                  <Col style={{ gap: 0 }}>
                    <div
                      style={{
                        fontSize: 12,
                        fontWeight: 700,
                        fontFamily: "Caveat",
                        color: "#5C6633",
                      }}
                    >
                      Strava matched · Morning Run
                    </div>
                    <Small>7.9 mi · 57:42 · 7:17 avg pace · 148 bpm avg</Small>
                  </Col>
                  <Spacer />
                  <div style={{ fontSize: 10, color: "#9B8E7E", fontFamily: "Caveat" }}>↓ laps</div>
                </Row>
              </Box>
              <Divider />
              <Box
                className="dashed"
                style={{ padding: 8, textAlign: "center", borderRadius: 4, fontSize: 12 }}
              >
                ✦ Ask coach about today's workout
              </Box>
            </Box>

            {/* Tomorrow + day after */}
            <Label style={{ marginBottom: 6 }}>Coming up</Label>
            {[
              ["Sat", "Long Run", "long", "18 mi · 2:30"],
              ["Sun", "Recovery", "recovery", "5 mi · 45 min"],
            ].map(([day, name, type, dist]) => (
              <Box key={day} style={{ padding: 10, marginBottom: 6 }}>
                <Row>
                  <Small style={{ width: 28 }}>{day}</Small>
                  <Badge type={type} />
                  <Spacer />
                  <Small>{dist}</Small>
                </Row>
              </Box>
            ))}
          </div>

          <FAB />
          <TabBar active="today" />
        </div>
      );

      /* ─── SCREEN 3: Today (Desktop) ─── */
      const TodayDesktop = () => (
        <div className="sk-screen" style={{ width: 900, height: 600, display: "flex" }}>
          <Sidebar active="today" />
          {/* Main content */}
          <div
            style={{
              flex: 1,
              padding: 24,
              overflowY: "auto",
              display: "flex",
              flexDirection: "column",
              gap: 16,
            }}
          >
            <div>
              <div className="sk-h1" style={{ fontSize: 20 }}>
                Friday, April 25
              </div>
              <Label>Week 8 of 16 — Boston Marathon Build</Label>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 16 }}>
              {/* Hero card */}
              <Box style={{ padding: 20, borderColor: "#C4622D", borderWidth: 2 }}>
                <Row style={{ marginBottom: 12 }}>
                  <Badge type="tempo" />
                  <Spacer />
                  <Small>8 mi · 60 min</Small>
                </Row>
                <Box className="muted" style={{ padding: 12, marginBottom: 12 }}>
                  <Row>
                    <Col style={{ gap: 2 }}>
                      <Small>Target Pace</Small>
                      <div style={{ fontSize: 16, fontWeight: 700, fontFamily: "Caveat" }}>
                        7:15–7:30 /mi
                      </div>
                    </Col>
                    <Spacer />
                    <Col style={{ gap: 2 }}>
                      <Small>HR Zone</Small>
                      <div style={{ fontSize: 16, fontWeight: 700, fontFamily: "Caveat" }}>
                        Z3–Z4
                      </div>
                    </Col>
                    <Spacer />
                    <Col style={{ gap: 2 }}>
                      <Small>RPE</Small>
                      <div style={{ fontSize: 16, fontWeight: 700, fontFamily: "Caveat" }}>
                        7/10
                      </div>
                    </Col>
                  </Row>
                </Box>
                <div
                  style={{
                    fontSize: 13,
                    fontFamily: "Caveat",
                    color: "#5c5048",
                    lineHeight: 1.5,
                    marginBottom: 12,
                  }}
                >
                  2mi easy warm-up → 4mi at tempo → 2mi cool-down. Stay relaxed, not a race effort.
                </div>
                {/* Strava match */}
                <Box className="muted" style={{ padding: 10, borderColor: "#5C6633" }}>
                  <Row>
                    <span style={{ color: "#5C6633" }}>✓</span>
                    <Col style={{ gap: 1 }}>
                      <div
                        style={{
                          fontSize: 12,
                          fontWeight: 700,
                          fontFamily: "Caveat",
                          color: "#5C6633",
                        }}
                      >
                        Strava matched · Morning Run
                      </div>
                      <Small>7.9 mi · 57:42 · 7:17 avg · 148 bpm</Small>
                    </Col>
                    <Spacer />
                    <div
                      style={{
                        fontSize: 11,
                        color: "#C4622D",
                        fontFamily: "Caveat",
                        cursor: "pointer",
                      }}
                    >
                      View laps →
                    </div>
                  </Row>
                </Box>
                <Divider />
                <Box className="dashed" style={{ padding: 8, textAlign: "center", fontSize: 12 }}>
                  ✦ Ask coach about today's workout
                </Box>
              </Box>
              {/* Upcoming sidebar */}
              <Col style={{ gap: 8 }}>
                <Label>This week</Label>
                {[
                  ["Mon", "Easy", "easy", "✓"],
                  ["Tue", "Threshold", "threshold", "✓"],
                  ["Wed", "Rest", "rest", "✓"],
                  ["Thu", "Easy", "easy", "✓"],
                  ["Fri", "Tempo", "tempo", "→"],

                  color: "#fff",
                  border: "1.5px solid #1E1A14",
                }}
              >
                Clear chat
              </Box>
            </Row>
          </Box>
        </div>
      );

      /* ─── SCREEN 9: Settings ─── */
      const SettingsScreen = () => (
        <div
          className="sk-screen"
          style={{ width: 375, height: 720, display: "flex", flexDirection: "column" }}
        >
          <div
            style={{
              height: 24,
              background: "#F5F0E8",
              display: "flex",
              alignItems: "center",
              padding: "0 16px",
              justifyContent: "space-between",
            }}
          >
            <Small>9:41</Small>
            <Small>●●●</Small>
          </div>
          <div style={{ padding: "12px 16px 8px", borderBottom: "1px solid #EDE8DC" }}>
            <div className="sk-h2">Settings</div>
          </div>
          <div
            style={{
              flex: 1,
              overflowY: "auto",
              padding: "16px",
              display: "flex",
              flexDirection: "column",
              gap: 20,
              paddingBottom: 80,
            }}
          >
            {/* Preferences */}
            <Col style={{ gap: 10 }}>
              <Label>Preferences</Label>
              {[
                ["Units", "Miles"],
                ["Pace format", "min/mi"],
                ["Timezone", "America/Los_Angeles"],
              ].map(([label, val]) => (
                <Box key={label} style={{ padding: "10px 12px" }}>
                  <Row>
                    <div style={{ fontSize: 13, fontFamily: "Caveat", color: "#1E1A14" }}>
                      {label}
                    </div>
                    <Spacer />
                    <div style={{ fontSize: 13, fontFamily: "Caveat", color: "#9B8E7E" }}>
                      {val} ›
                    </div>
                  </Row>
                </Box>
              ))}
            </Col>

            <Divider />

            {/* Coach notes editor */}
            <Col style={{ gap: 8 }}>
              <Row>
                <Label>Coach notes</Label>
                <Spacer />
                <div style={{ fontSize: 11, fontFamily: "Caveat", color: "#9B8E7E" }}>
                  312 / 4096 chars
                </div>
              </Row>
              <div
                style={{ fontSize: 11, fontFamily: "Caveat", color: "#9B8E7E", lineHeight: 1.4 }}
              >
                The coach keeps notes about you here — goals, injuries, preferences. You can edit or
                reset them.
              </div>
              <Box className="dashed" style={{ padding: 12, borderRadius: 4, minHeight: 120 }}>
                <div
                  style={{ fontSize: 12, fontFamily: "Caveat", color: "#5c5048", lineHeight: 1.6 }}
                >
                  Goal: Boston Marathon, May 5 2026. Target 3:05.
                  <br />
                  Left achilles has been tight — monitor on long runs.
                  <br />
                  Prefers roads over track. No treadmill.
                  <br />
                  Runs Tuesday / Thursday / Saturday / Sunday.
                </div>
              </Box>
              <Row style={{ gap: 8 }}>
                <Box
                  className="accent"
                  style={{
                    flex: 1,
                    padding: "8px 0",
                    textAlign: "center",
                    fontSize: 13,
                    borderRadius: 4,
                    cursor: "pointer",
                  }}
                >
                  Save notes
                </Box>
                <Box
                  className="dashed"
                  style={{
                    padding: "8px 12px",
                    textAlign: "center",
                    fontSize: 13,
                    borderRadius: 4,
                    cursor: "pointer",
                    color: "#9B8E7E",
                  }}
                >
                  Reset
                </Box>
              </Row>
            </Col>

            <Divider />

            {/* Strava */}
            <Col style={{ gap: 8 }}>
              <Label>Strava</Label>
              <Box style={{ padding: "10px 12px" }}>
                <Row>
                  <div style={{ fontSize: 13, fontFamily: "Caveat" }}>
                    Connected as Colby Schulz
                  </div>
                  <Spacer />
                  <div
                    style={{
                      fontSize: 12,
                      fontFamily: "Caveat",
                      color: "#9B8E7E",
                      cursor: "pointer",
                    }}
                  >
                    Disconnect
                  </div>
                </Row>
              </Box>
              <Box
                className="dashed"
                style={{
                  padding: "10px 12px",
                  textAlign: "center",
                  fontSize: 12,
                  cursor: "pointer",
                }}
              >
                Sync last 7 days manually
              </Box>
            </Col>
          </div>
          <TabBar active="" />
        </div>
      );

      /* ─── Main render ─── */
      function App() {
        return (
          <DesignCanvas title="Race Horse — Wireframes">
            <DCSection id="landing" title="Landing Page">
              <DCArtboard id="landing-mobile" label="Mobile — Sign In" width={375} height={660}>
                <LandingScreen />
              </DCArtboard>
            </DCSection>

            <DCSection id="today" title="Today">
              <DCArtboard id="today-mobile" label="Mobile" width={375} height={720}>
                <TodayMobile />
              </DCArtboard>
              <DCArtboard
                id="today-desktop"
                label="Desktop w/ Coach Panel"
                width={900}
                height={600}
              >
                <TodayDesktop />
              </DCArtboard>
            </DCSection>

            <DCSection id="calendar" title="Calendar">
              <DCArtboard id="cal-week" label="Mobile — Week View" width={375} height={720}>
                <CalendarWeekMobile />
              </DCArtboard>
              <DCArtboard id="cal-month" label="Desktop — Month View" width={900} height={620}>
                <CalendarMonthDesktop />
              </DCArtboard>
            </DCSection>

            <DCSection id="plans" title="Plans">
              <DCArtboard id="plans-mobile" label="Mobile — Plan List" width={375} height={720}>
                <PlansScreen />
              </DCArtboard>
              <DCArtboard id="upload-sheet" label="Mobile — Upload Sheet" width={375} height={500}>
                <UploadSheet />
              </DCArtboard>
            </DCSection>

            <DCSection id="coach" title="Coach">
              <DCArtboard id="coach-full" label="Mobile — Rolling Chat" width={375} height={720}>
                <CoachScreen />
              </DCArtboard>
              <DCArtboard id="coach-clear" label="Clear Chat Confirm" width={375} height={260}>
                <ClearChatConfirm />
              </DCArtboard>
            </DCSection>

            <DCSection id="settings" title="Settings">
              <DCArtboard
                id="settings-mobile"
                label="Mobile — Preferences + Coach Notes"
                width={375}
                height={720}
              >
                <SettingsScreen />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
    <div id="root"></div>
  </body>
</html>
